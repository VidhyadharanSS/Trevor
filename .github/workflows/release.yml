name: Release

# Build Trevor desktop bundles for every supported platform and publish them
# to a GitHub Release. Runs on:
#   • push of a version tag (v*.*.*)
#   • manual workflow_dispatch (creates a draft release for the given tag)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Create the draft release first so every matrix job can upload to it
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag_name: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = "${{ steps.resolve.outputs.tag }}";
            // Re-use an existing draft for the tag if there is one.
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = releases.data.find(r => r.tag_name === tag);
            if (existing) {
              core.info(`Re-using existing release ${existing.id} for ${tag}`);
              return existing.id;
            }
            const created = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Trevor ${tag}`,
              body: [
                "## Trevor " + tag,
                "",
                "Local-first markdown notes for Linux, macOS, and Windows.",
                "",
                "### Downloads",
                "",
                "| Platform | File |",
                "| --- | --- |",
                "| Linux x86_64 (AppImage) | `Trevor_*_amd64.AppImage` |",
                "| Linux x86_64 (.deb)     | `trevor_*_amd64.deb` |",
                "| Linux arm64 (AppImage)  | `Trevor_*_aarch64.AppImage` |",
                "| Linux arm64 (.deb)      | `trevor_*_arm64.deb` |",
                "| macOS (Universal .dmg)  | `Trevor_*_universal.dmg` |",
                "| Windows (.msi)          | `Trevor_*_x64_en-US.msi` |",
                "",
                "After downloading the AppImage, make it executable:",
                "",
                "```bash",
                "chmod +x Trevor_*.AppImage",
                "./Trevor_*.AppImage",
                "```",
                "",
                "See the [README](https://github.com/${{ github.repository }}#readme) for full installation instructions.",
              ].join("\n"),
              draft: true,
              prerelease: false,
            });
            return created.data.id;

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build the Tauri bundle on each target platform
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - label: linux-arm64
            os: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            tauri_args: ""
          - label: macos-universal
            os: macos-14
            rust_target: universal-apple-darwin
            tauri_args: "--target universal-apple-darwin"
          - label: windows-x86_64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.label }}

      # ── Linux system deps (both x86_64 and arm64 use ubuntu-22.04 image) ─
      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Generate platform icons from the source SVG ─────────────────────
      - name: Generate Tauri icons
        run: npx --yes @tauri-apps/cli icon src-tauri/icons/icon.svg

      # ── Build the Tauri bundle ──────────────────────────────────────────
      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code-signing on macOS — release without notarisation.
          # Set APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD secrets later
          # to enable signed builds.
          CI: true
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.tauri_args }}

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Publish the release once all builds succeeded
  # ─────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: "${{ needs.create-release.outputs.release_id }}",
              draft: false,
              prerelease: false,
            });
