name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Typecheck & build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --pretty false

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist
          retention-days: 7

  rust:
    name: Check Rust crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      # Fast guard (≈2 s) that prevents the most common Tauri pitfall:
      # a Cargo feature flag on the `tauri` crate that has no matching
      # opt-in inside `tauri.conf.json` (or vice versa). Catching this
      # here saves a full clippy/check cycle (~2 min) on every drift.
      - name: Validate Tauri feature ↔ config consistency
        working-directory: src-tauri
        shell: bash
        run: |
          python3 - <<'PY'
          import json, re, sys, pathlib
          cargo  = pathlib.Path("Cargo.toml").read_text()
          conf   = json.loads(pathlib.Path("tauri.conf.json").read_text())
          m      = re.search(r'^\s*tauri\s*=\s*\{[^}]*features\s*=\s*\[([^\]]*)\]', cargo, re.M)
          feats  = re.findall(r'"([^"]+)"', m.group(1)) if m else []
          app    = conf.get("app", {})
          errors = []
          if "macos-private-api" in feats and not app.get("macOSPrivateApi"):
              errors.append("Cargo enables `macos-private-api` but tauri.conf.json#app.macOSPrivateApi is not true")
          if app.get("macOSPrivateApi") and "macos-private-api" not in feats:
              errors.append("tauri.conf.json#app.macOSPrivateApi=true but Cargo does not enable `macos-private-api`")
          if errors:
              print("::error::Tauri feature/config drift detected:")
              for e in errors: print(f"  - {e}")
              sys.exit(1)
          print(f"OK — tauri features: {feats or '[]'}")
          PY

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets
