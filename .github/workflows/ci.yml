name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Typecheck & build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --pretty false

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist
          retention-days: 7

  rust:
    name: Check Rust crate
    runs-on: ubuntu-latest
    # `tauri::generate_context!()` validates that `frontendDist` (../dist)
    # exists at compile time, so we must build the frontend first.
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential

      # `tauri::generate_context!()` reads `tauri.conf.json#build.frontendDist`
      # (= "../dist") and panics at macro-expansion time if the directory does
      # not exist. The `frontend` job builds and uploads `dist/` as an artifact
      # — restore it here before any cargo command touches the lib crate.
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      # Fast pre-flight guard (≈2 s) that catches the most common Tauri
      # pitfalls *before* the slow clippy/check cycle (~2 min):
      #
      #   1. Cargo feature ↔ tauri.conf.json drift (e.g. `macos-private-api`).
      #   2. Missing referenced files: every icon listed under `bundle.icon`
      #      and the `build.frontendDist` directory must exist on disk —
      #      otherwise `tauri::generate_context!()` panics at macro-expansion
      #      time deep inside the compile, with a confusing error.
      #
      # If you reference a new file from tauri.conf.json, commit it. If you
      # remove a file, drop the reference. This guard fails fast either way.
      - name: Validate Tauri config (features + referenced files)
        working-directory: src-tauri
        shell: bash
        run: |
          python3 - <<'PY'
          import json, re, sys, pathlib
          here   = pathlib.Path(".").resolve()
          cargo  = pathlib.Path("Cargo.toml").read_text()
          conf   = json.loads(pathlib.Path("tauri.conf.json").read_text())
          errors = []

          # --- 1. Cargo feature ↔ config drift -----------------------------
          m      = re.search(r'^\s*tauri\s*=\s*\{[^}]*features\s*=\s*\[([^\]]*)\]', cargo, re.M)
          feats  = re.findall(r'"([^"]+)"', m.group(1)) if m else []
          app    = conf.get("app", {})
          if "macos-private-api" in feats and not app.get("macOSPrivateApi"):
              errors.append("Cargo enables `macos-private-api` but tauri.conf.json#app.macOSPrivateApi is not true")
          if app.get("macOSPrivateApi") and "macos-private-api" not in feats:
              errors.append("tauri.conf.json#app.macOSPrivateApi=true but Cargo does not enable `macos-private-api`")

          # --- 2. Bundle icon files exist ----------------------------------
          for icon in conf.get("bundle", {}).get("icon", []):
              p = (here / icon).resolve()
              if not p.is_file():
                  errors.append(f"bundle.icon references missing file: {icon}  (looked at {p})")

          # --- 3. frontendDist directory exists ----------------------------
          fd = conf.get("build", {}).get("frontendDist")
          if fd:
              p = (here / fd).resolve()
              if not p.is_dir():
                  # Not fatal here — the `Download frontend dist` step above
                  # is responsible for materialising it. Only warn so future
                  # local runs surface the issue, but never block CI.
                  print(f"::notice::build.frontendDist not present yet: {fd} (expected; restored from artifact)")

          # --- 4. plugins.* config shape -----------------------------------
          # Tauri v2 plugins fall into two categories:
          #
          #   * "configurable" — accept a JSON object describing scopes,
          #     endpoints, etc.  These MAY appear under `plugins` with a
          #     non-empty object value.
          #   * "unit"         — accept no configuration.  Tauri's serde
          #     deserializer rejects ANY value (including `{}`) for these
          #     and the app crashes at startup with:
          #         PluginInitialization("<name>", "invalid type: map,
          #         expected unit")
          #
          # Listing a unit plugin under `plugins` at all is an error — the
          # crate is activated by `.plugin(tauri_plugin_X::init())` in Rust;
          # the JSON entry adds nothing and breaks runtime.
          CONFIGURABLE_PLUGINS = {
              "fs", "http", "shell", "updater", "cli", "deep-link",
              "single-instance",
          }
          for name, value in (conf.get("plugins") or {}).items():
              if name in CONFIGURABLE_PLUGINS:
                  if not isinstance(value, dict) or not value:
                      errors.append(
                          f"plugins.{name} is configurable but its value is "
                          f"empty/non-object — either supply a config object "
                          f"or remove the key entirely"
                      )
              else:
                  errors.append(
                      f"plugins.{name} is a unit plugin (no config schema). "
                      f"Tauri will crash at startup with `invalid type: map, "
                      f"expected unit`. Remove the `\"{name}\": ...` entry — "
                      f"the plugin is activated from Rust via "
                      f"`tauri_plugin_{name.replace('-', '_')}::init()`."
                  )

          if errors:
              print("::error::Tauri config validation failed:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"OK — tauri features: {feats or '[]'}, icons: {len(conf.get('bundle', {}).get('icon', []))} present")
          PY

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets
