<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="mark" x1="200" y1="280" x2="824" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.55" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="960" height="960" rx="208" fill="none" stroke="#4f46e5" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Soft accent halo -->
  <circle cx="512" cy="540" r="240" fill="#6366f1" fill-opacity="0.18" filter="url(#soft)"/>

  <!-- Stylised "T" — three-bar serif mark suggesting a stack of pages -->
  <g stroke="url(#mark)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top bar -->
    <path d="M256 320 H 768" stroke-width="64"/>
    <!-- Vertical stem -->
    <path d="M512 320 V 760" stroke-width="64"/>
    <!-- Page-stack accents -->
    <path d="M312 470 H 712" stroke-width="28" stroke-opacity="0.55"/>
    <path d="M352 580 H 672" stroke-width="22" stroke-opacity="0.4"/>
    <path d="M392 680 H 632" stroke-width="18" stroke-opacity="0.28"/>
  </g>

  <!-- Corner spark -->
  <circle cx="780" cy="280" r="14" fill="#a5b4fc"/>
</svg>
