<!doctype html>
<html lang="en" class="dark" data-theme="trevor-dark" style="color-scheme: dark;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/trevor-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0f" />
    <title>Trevor</title>
    <style>
      /*
       * Pre-paint defaults so the first frame is already dark — even
       * before React + Zustand hydrate the persisted settings.
       *
       * These values mirror the [data-theme="trevor-dark"] tokens in
       * src/styles/globals.css.  Once the settings store is hydrated,
       * applySettingsToDOM() takes over and may switch to a different
       * theme if the user previously chose one.
       */
      :root {
        --color-bg: #0d0d0f;
        --color-bg-secondary: #17171a;
        --color-bg-tertiary: #1c1c20;
        --color-text: #e6e6e9;
        --color-accent: #7c5cff;
      }
      html, body {
        background-color: #0d0d0f;
        color: #e6e6e9;
        margin: 0;
        padding: 0;
      }
      /* Loading spinner shown while React mounts */
      #initial-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0d0d0f;
        z-index: 9999;
      }
      #initial-loader::after {
        content: "";
        width: 28px; height: 28px;
        border: 2px solid rgba(124,92,255,0.18);
        border-top-color: #7c5cff;
        border-radius: 50%;
        animation: trevor-spin 0.8s linear infinite;
      }
      @keyframes trevor-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
